{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "voujr.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "voujr.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "voujr.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # Allow Prometheus to scrape /metrics.
    - ports:
        - port: metrics
          protocol: TCP
  egress:
    # DNS resolution.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API server + provider/gateway/alert endpoints (HTTPS).
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
