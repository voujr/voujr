# Values for the in-cluster voujr continuous-audit controller (team mode).
# It runs `voujr controller --in-cluster`: scans the fleet on a schedule,
# persists findings, fires incidents, and serves /metrics. It needs NO AI key.

replicaCount: 2          # leader election → one active owner runs the scan loop

image:
  repository: ghcr.io/voujr/voujr
  tag: ""                # defaults to the chart appVersion
  pullPolicy: IfNotPresent

# nameOverride: ""
# fullnameOverride: ""

serviceAccount:
  create: true
  name: ""               # defaults to the release fullname

rbac:
  create: true           # read-only ClusterRole + binding (all the controller needs)

audit:
  interval: 15m          # continuous fleet-scan cadence (Go duration)

incident:
  escalateAtOrAbove: P1  # min severity to alert on (P0 | P1)
  slack:
    existingSecret: ""   # Secret with key SLACK_WEBHOOK_URL
  pagerduty:
    existingSecret: ""   # Secret with key PAGERDUTY_ROUTING_KEY

# Optional: encrypt sensitive stored columns at rest.
dbEncryption:
  existingSecret: ""     # Secret with key VOUJR_DB_KEY

metrics:
  enabled: true
  serviceMonitor: true   # requires the Prometheus Operator CRDs

# Pod/container hardening to satisfy the "restricted" Pod Security Standard.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Restrict egress to DNS + HTTPS (API server, provider/gateway, alert endpoints).
networkPolicy:
  enabled: true
