name: Release

# Publishes a release for any pushed v* tag (binaries, packages, signed
# multi-arch images, SBOM). The day-to-day flow is automated by Release Please
# (.github/workflows/release-please.yml); this is the manual escape hatch:
#   git tag v1.2.3 && git push origin v1.2.3
# If you tag manually, also bump .release-please-manifest.json to match.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push images to GHCR
  id-token: write # cosign keyless signing (OIDC)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable # release binaries built with the latest patched Go

      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
