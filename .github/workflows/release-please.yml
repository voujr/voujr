name: Release Please

# Fully automated, conventional-commit-driven releases.
#   1. On every push to main, Release Please opens/updates a "release PR" that
#      maintains CHANGELOG.md and computes the next version from your commits
#      (fix -> patch, feat -> minor, feat!/BREAKING CHANGE -> major; pre-1.0 it
#      keeps breaking changes at minor).
#   2. When you MERGE that PR, Release Please cuts the tag + GitHub release.
#   3. The tag (pushed with a PAT, so it CAN trigger other workflows) fires
#      release.yml, which builds and attaches the binaries/packages/images.
#
# RELEASE_PLEASE_TOKEN is a PAT (Contents + Pull requests: read & write). It is
# required: the built-in GITHUB_TOKEN can neither trigger CI on the release PR
# nor trigger release.yml from the tag it creates.
on:
  push:
    branches: [main]

permissions:
  contents: write # create the release PR, the release, and the tag
  pull-requests: write # open/update the release PR

# Run JS actions on Node.js 24 ahead of the June 2026 default switch, silencing
# the Node 20 deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
