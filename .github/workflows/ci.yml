name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Run JS actions on Node.js 24 ahead of the June 2026 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 'stable' = the latest patched Go release. Avoids building/testing on an
      # unpatched toolchain and satisfies the go.mod `go` directive (a minimum).
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Use a patched Go: govulncheck reports against the toolchain's stdlib, so
      # an unpatched Go would flag standard-library CVEs already fixed upstream.
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      # Build golangci-lint with the CI Go toolchain so its build version is >=
      # the module's `go` directive (golangci-lint refuses to run otherwise), and
      # so it understands the v2 config. Compiling from source is deterministic.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Lint
        run: golangci-lint run ./...
